local: true

sources_config:
  ids: [1]
  default:
    inf_frame: 2
    conf_threshold: 0.01
    nms_iou_threshold: 0.5

elastic_config:
  url: http://localhost:9200
  index_name: embeddings-live
  
triton_config:
  url: http://localhost:8001

inference_config:
  task: ObjectDetection
  instances: 77
  models:
    YOLO:
      name: yolov9-t
      precision: FP16
      input_name: images
      input_shape: [3, 640, 640]
      nms_in_triton: false
      output_name: output
      output_shape: [84, 8400]
      # CPU NMS:
      #   keep `nms_in_triton: false`
      #   keep `output_name` + `output_shape`
      #
      # Triton EfficientNMS:
      #   set `nms_in_triton: true`
      #   comment out `output_name` + `output_shape`
      #   uncomment `outputs`
      # outputs:
      #   - name: num_dets
      #     data_type: TYPE_INT32
      #     shape: [1]
      #   - name: det_boxes
      #     data_type: TYPE_FP32
      #     shape: [300, 4]
      #   - name: det_scores
      #     data_type: TYPE_FP32
      #     shape: [300]
      #   - name: det_classes
      #     data_type: TYPE_INT32
      #     shape: [300]
      batch_max_size: 2
      batch_max_queue_delay: 1500
      batch_preferred_sizes: [1, 2]

    # DINO:
