local: true

sources_config:
  ids: [1,2,3,4,5,6]
  default:
    inf_frame: 2
    conf_threshold: 0.01
    nms_iou_threshold: 0.5

elastic_config:
  url: http://localhost:9200
  index_name: embeddings-live
  
triton_config:
  url: http://localhost:8001
  use_shm: true

inference_config:
  task: ObjectDetection
  instances: 5
  models:
    YOLO:
      name: yolov9-e-nms
      precision: FP16
      input_name: images
      input_shape: [3, 640, 640]
      nms_in_triton: true
      output_name: det_packed
      output_shape: [1801]

      # CPU NMS:
      #   keep `nms_in_triton: false`
      #   keep `output_name` + `output_shape`
      #
      # Triton packed EfficientNMS:
      #   set `nms_in_triton: true`
      #   use a single packed output named `det_packed`
      #   shape is [1 + 6*K], where K = max_output_boxes in inject_nms.py
      #   for the default K=300, use [1801]
      #
      # Legacy single-output form is also supported:
      # output_name: det_packed
      # output_shape: [1801]
      
      batch_max_size: 32
      batch_max_queue_delay: 1500
      batch_preferred_sizes: [16]

    # DINO:
