local: true

sources_config:
  ids: [1, 2, 3, 4, 5]
  default:
    inf_frame: 2
    conf_threshold: 0.01
    nms_iou_threshold: 0.5

elastic_config:
  url: http://localhost:9200
  index_name: embeddings-live
  
triton_config:
  url: http://localhost:8001

inference_config:
  task: ObjectDetection
  instances: 77
  models:
    YOLO:
      name: yolov9-t
      precision: FP16
      input_name: images
      input_shape: [3, 640, 640]
      outputs:
        - name: num_detections
          data_type: TYPE_INT32
          shape: [1]
        - name: detection_boxes
          data_type: TYPE_FP32
          shape: [300, 4]
        - name: detection_scores
          data_type: TYPE_FP32
          shape: [300]
        - name: detection_classes
          data_type: TYPE_INT32
          shape: [300]
      batch_max_size: 4
      batch_max_queue_delay: 1500
      batch_preferred_sizes: [1, 2]

